name: Generate Snake Animation

on:
  # Se ejecuta automáticamente todos los días a medianoche
  schedule:
    - cron: "0 0 * * *"
  
  # Permite ejecutar el flujo manualmente desde la pestaña 'Actions'
  workflow_dispatch:
  
  # Se ejecuta cada vez que haces push en la rama principal
  push:
    branches:
    - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # Genera la animación en formato SVG
      - name: generate-github-contribution-grid-snake-animation
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # Guarda la imagen generada en una rama independiente llamada "output"
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
